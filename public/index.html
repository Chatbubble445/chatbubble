<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body { margin:0; font-family: Arial; background:#0b141a; color:white; }

#sidebar {
  width:250px;
  background:#202c33;
  position:fixed;
  left:-260px;
  top:0;
  height:100%;
  transition:0.3s;
  padding:10px;
}
#sidebar.open { left:0; }

#users li {
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

#users li:hover {
  background:#2a3942;
}

#top {
  background:#202c33;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.menuBtn { cursor:pointer; }

#chat {
  height:calc(100vh - 110px);
  overflow-y:auto;
  padding:10px;
}

.msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
.me { background:#005c4b; margin-left:auto; }
.other { background:#202c33; }

.system { text-align:center; color:gray; }

#inputBox {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:5px;
  padding:8px;
  background:#202c33;
}

#msg { flex:1; padding:8px; }
button { padding:8px; background:#00a884; color:white; border:none; }
</style>
</head>

<body>

<div id="sidebar">
  <h3>🟢 Online Users</h3>
  <ul id="users"></ul>
</div>

<div id="top">
  <span class="menuBtn" onclick="toggleSidebar()">☰ ChatBubble</span>
  <span onclick="logout()">🚪</span>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = localStorage.getItem("username");

if(!username){
  username = prompt("Enter name");
  localStorage.setItem("username", username);
}

let currentDM = null;

// join
socket.emit("join", {name: username});

// sidebar
function toggleSidebar(){
  sidebar.classList.toggle("open");
}

// logout
function logout(){
  localStorage.removeItem("username");
  location.reload();
}

// send
function sendMsg(){
  const msg = document.getElementById("msg").value;

  if(currentDM){
    socket.emit("dm", {to: currentDM, msg});
  } else {
    socket.emit("message", msg);
  }

  msg.value = "";
  document.getElementById("msg").value = "";
}

// UI
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSystem(text){
  const div = document.createElement("div");
  div.className = "system";
  div.innerText = text;
  chat.appendChild(div);
}

// receive
socket.on("message", data => {
  if(!currentDM){
    if(data.user === username){
      addMsg("me", data.text);
    } else {
      addMsg("other", data.user + ": " + data.text);
    }
  }
});

// DM receive
socket.on("dm", data => {
  addMsg("other", "💬 " + data.from + ": " + data.text);
});

// system
socket.on("system", data => addSystem(data.text));

// users list
socket.on("users", users => {
  usersList.innerHTML = "";

  Object.entries(users).forEach(([id, u]) => {
    const li = document.createElement("li");
    li.innerText = u.name;

    li.onclick = () => {
      currentDM = id;
      chat.innerHTML = "";
      addSystem("💬 Chatting with " + u.name);
    };

    usersList.appendChild(li);
  });
});

const chat = document.getElementById("chat");
const usersList = document.getElementById("users");
const sidebar = document.getElementById("sidebar");
</script>

</body>
</html>
