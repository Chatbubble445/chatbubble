<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
}

/* Sidebar */
#sidebar {
  width:250px;
  background:#202c33;
  position:fixed;
  left:-260px;
  top:0;
  height:100%;
  transition:0.3s;
  z-index:100;
  padding:10px;
}

#sidebar.open {
  left:0;
}

#users li {
  padding:10px;
  border-bottom:1px solid #333;
}

/* Top */
#top {
  background:#202c33;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menuBtn {
  font-size:20px;
  cursor:pointer;
  margin-right:10px;
}

.icon {
  margin-left:10px;
  cursor:pointer;
}

/* Chat */
#chat {
  height:calc(100vh - 120px);
  overflow-y:auto;
  padding:10px;
}

/* Messages */
.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me {
  background:#005c4b;
  margin-left:auto;
}

.other {
  background:#202c33;
}

/* System msg */
.system {
  text-align:center;
  color:gray;
  font-size:12px;
  margin:5px;
}

/* Input */
#inputBox {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#202c33;
}

#msg {
  flex:1;
  padding:10px;
  border:none;
}

button {
  padding:10px;
}

img {
  max-width:100%;
  border-radius:10px;
}
</style>

</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h3>🟢 Online Users</h3>
  <ul id="users"></ul>
</div>

<!-- Top -->
<div id="top">
  <div>
    <span class="menuBtn" onclick="toggleSidebar()">☰</span>
    ChatBubble
  </div>

  <div>
    <span class="icon">💬</span>
    <span class="icon" onclick="logout()">🚪</span>
  </div>
</div>

<!-- Chat -->
<div id="chat"></div>

<!-- Input -->
<div id="inputBox">
  <input id="msg" placeholder="Type message">
  <input type="file" id="file" accept="image/*" onchange="sendImage()">
  <button onclick="sendMsg()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = prompt("Enter name") || "Guest" + Math.floor(Math.random()*1000);

// join
socket.emit("join", {name: username, room: "global"});

// sidebar toggle
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

// click outside close
document.addEventListener("click", function(e){
  const sidebar = document.getElementById("sidebar");
  const btn = document.querySelector(".menuBtn");

  if(!sidebar.contains(e.target) && !btn.contains(e.target)){
    sidebar.classList.remove("open");
  }
});

// logout
function logout(){
  location.reload();
}

// send message
function sendMsg(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  socket.emit("message", msg);
  document.getElementById("msg").value = "";
}

// send image
function sendImage(){
  const file = document.getElementById("file").files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    socket.emit("image", e.target.result);
  };

  reader.readAsDataURL(file);
}

// add text
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
  scrollDown();
}

// add image
function addImage(type, src){
  const div = document.createElement("div");
  div.className = "msg " + type;

  const img = document.createElement("img");
  img.src = src;

  div.appendChild(img);
  document.getElementById("chat").appendChild(div);
  scrollDown();
}

// system msg
function addSystem(text){
  const div = document.createElement("div");
  div.className = "system";
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
  scrollDown();
}

// scroll
function scrollDown(){
  document.getElementById("chat").scrollTop = 999999;
}

// receive message
socket.on("message", (data) => {
  if(data.user === username){
    addMsg("me", data.text);
  } else {
    addMsg("other", data.user + ": " + data.text);
  }
});

// receive image
socket.on("image", (data) => {
  if(data.user === username){
    addImage("me", data.src);
  } else {
    addImage("other", data.src);
  }
});

// system (join/leave)
socket.on("system", (data) => {
  addSystem(data.text);
});

// users
socket.on("users", (users) => {
  const ul = document.getElementById("users");
  ul.innerHTML = "";

  Object.values(users).forEach(u => {
    const li = document.createElement("li");
    li.innerText = u.name;
    ul.appendChild(li);
  });
});
</script>

</body>
</html>
