<!DOCTYPE html>
<html>
<head>
  <title>ChatBubble</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      display:flex;
      flex-direction:column;
      background:#0b141a;
      font-family:sans-serif;
      color:white;
    }

    /* HEADER */
    #top {
      height:50px;
      background:#202c33;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      flex-shrink:0;
      z-index:10;
    }

    #menuBtn {
      font-size:22px;
      cursor:pointer;
    }

    #icons span {
      margin-left:10px;
      cursor:pointer;
    }

    /* SIDEBAR */
    #sidebar {
      position:fixed;
      left:-250px;
      top:0;
      width:250px;
      height:100%;
      background:#202c33;
      padding:10px;
      transition:0.3s;
      z-index:20;
    }

    #sidebar.active {
      left:0;
    }

    #users {
      list-style:none;
      margin-top:10px;
    }

    #users li {
      padding:8px;
      border-bottom:1px solid #333;
    }

    /* CHAT */
    #chat {
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .msg {
      padding:10px;
      border-radius:10px;
      max-width:75%;
    }

    .me {
      background:#005c4b;
      align-self:flex-end;
    }

    .other {
      background:#202c33;
      align-self:flex-start;
    }

    .system {
      text-align:center;
      font-size:12px;
      color:#aaa;
    }

    img {
      max-width:200px;
      border-radius:10px;
    }

    /* INPUT */
    #inputBox {
      display:flex;
      gap:5px;
      padding:8px;
      background:#202c33;
      position:sticky;
      bottom:0;
    }

    #msg {
      flex:1;
      padding:10px;
      border:none;
      border-radius:20px;
      outline:none;
    }

    #sendBtn {
      width:40px;
      border:none;
      border-radius:50%;
      background:#00a884;
      color:white;
      font-size:16px;
    }

    #file { display:none; }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>🟢 Users</h3>
  <ul id="users"></ul>
</div>

<!-- HEADER -->
<div id="top">
  <span id="menuBtn">☰ ChatBubble</span>

  <div id="icons">
    <span onclick="alert('Messages coming soon')">💬</span>
    <span onclick="alert('Notifications coming soon')">🔔</span>
    <span onclick="logout()">👤</span>
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputBox">
  <input id="msg" placeholder="Type message..." />
  <input type="file" id="file" accept="image/*" onchange="sendImage()" />
  <button onclick="pick()">📎</button>
  <button id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const chat = document.getElementById("chat");
const msgInput = document.getElementById("msg");
const sidebar = document.getElementById("sidebar");
const usersList = document.getElementById("users");


// 🔥 SIDEBAR TOGGLE
document.getElementById("menuBtn").onclick = (e) => {
  e.stopPropagation();
  sidebar.classList.toggle("active");
};

// click outside close
document.addEventListener("click", (e) => {
  if (!sidebar.contains(e.target) && e.target.id !== "menuBtn") {
    sidebar.classList.remove("active");
  }
});


// 🔥 USER LOGIN
let username = localStorage.getItem("username");
if(!username){
  username = prompt("Enter name") || "Guest";
  localStorage.setItem("username", username);
}

socket.emit("join", { name: username });


// 🔥 LOGOUT
function logout(){
  localStorage.removeItem("username");
  location.reload();
}


// 🔥 MESSAGE
function addMsg(type,text){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addImage(type,src){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = `<img src="${src}">`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMsg(){
  let text = msgInput.value.trim();
  if(!text) return;
  socket.emit("message", text);
  msgInput.value="";
}


// 🔥 FILE
function pick(){
  document.getElementById("file").click();
}

function sendImage(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let reader = new FileReader();
  reader.onload = (e)=>{
    socket.emit("image", e.target.result);
  };
  reader.readAsDataURL(file);
}


// 🔥 SOCKET EVENTS
socket.on("message", (data)=>{
  if(data.user === username){
    addMsg("me", data.text);
  } else {
    addMsg("other", data.user + ": " + data.text);
  }
});

socket.on("image", (data)=>{
  if(data.user === username){
    addImage("me", data.src);
  } else {
    addImage("other", data.src);
  }
});

socket.on("system", (data)=>{
  let div = document.createElement("div");
  div.className="system";
  div.innerText=data.text;
  chat.appendChild(div);
});

socket.on("users", (users)=>{
  usersList.innerHTML="";
  Object.values(users).forEach(u=>{
    let li = document.createElement("li");
    li.innerText = u.name;
    usersList.appendChild(li);
  });
});

</script>

</body>
</html>
