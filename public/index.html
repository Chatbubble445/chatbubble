<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatBubble</title>

<style>
body { margin:0; font-family:sans-serif; background:#0c1b22; color:white; }

.topbar {
  background:#1f3a44;
  padding:10px;
  display:flex;
  align-items:center;
}

.menu { cursor:pointer; font-size:22px; }

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:-220px;
  top:0;
  width:200px;
  height:100%;
  background:#2b3e46;
  padding:15px;
  transition:0.3s;
  z-index:1000;
}

.sidebar.active { left:0; }

/* OVERLAY */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

.overlay.active { display:block; }

/* CHAT */
.chat {
  height:80vh;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg-left {
  background:#1f3a44;
  padding:8px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
  align-self:flex-start;
}

.msg-right {
  background:#16a34a;
  padding:8px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
  align-self:flex-end;
}

.username {
  font-size:11px;
  opacity:0.7;
}

img {
  max-width:150px;
  border-radius:10px;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  margin-left:5px;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  background:#16a34a;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div class="topbar">
  <span class="menu" onclick="openSidebar()">☰</span>
  <span style="margin-left:10px;">ChatBubble</span>
</div>

<div class="sidebar" id="sidebar">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="chat" id="chat"></div>

<div class="inputBox">
  <button type="button" onclick="openFile()">+</button>
  <input id="msg" placeholder="Type message">
  <button type="button" onclick="send()">➤</button>
</div>

<input type="file" id="file" hidden onchange="uploadFile()">

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let name = prompt("Enter name");
socket.emit("join", name);

/* SIDEBAR FIX */
function openSidebar(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

/* SEND FIX */
function send(){
  let input = document.getElementById("msg");
  let msg = input.value.trim();

  if(msg.length === 0) return;

  socket.emit("send", msg);
  input.value="";
}

/* ENTER KEY SUPPORT */
document.getElementById("msg").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    send();
  }
});

/* RECEIVE MSG */
socket.on("messages", (data)=>{
  let chat = document.getElementById("chat");
  chat.innerHTML="";

  data.forEach(m=>{
    if(m.system){
      chat.innerHTML += `<div style="text-align:center;color:gray">${m.text}</div>`;
    }
    else{
      let side = (m.user === name) ? "msg-right" : "msg-left";

      if(m.file){
        chat.innerHTML += `
          <div class="${side}">
            <div class="username">${m.user}</div>
            <img src="${m.file}">
          </div>`;
      } else {
        chat.innerHTML += `
          <div class="${side}">
            <div class="username">${m.user}</div>
            ${m.text}
          </div>`;
      }
    }
  });

  chat.scrollTop = chat.scrollHeight;
});

socket.on("users", (u)=>{
  document.getElementById("users").innerHTML = u.join("<br>");
});

/* FILE */
function openFile(){
  document.getElementById("file").click();
}

function uploadFile(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let form = new FormData();
  form.append("file", file);

  let xhr = new XMLHttpRequest();

  xhr.onload = ()=>{
    let res = JSON.parse(xhr.response);
    socket.emit("file", res.file);
  };

  xhr.open("POST","/upload");
  xhr.send(form);
}
</script>

</body>
</html>
