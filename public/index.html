<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBubble</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #203a43;
}

.menu-btn {
  font-size: 22px;
  cursor: pointer;
  margin-right: 10px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -220px;
  top: 0;
  width: 200px;
  height: 100%;
  background: #1b2b34;
  padding: 10px;
  transition: 0.3s;
}

.sidebar.active {
  left: 0;
}

/* CHAT */
.chat {
  height: calc(100vh - 100px);
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 5px;
  padding: 8px;
  border-radius: 10px;
  max-width: 70%;
}

.me {
  background: #00c853;
  margin-left: auto;
}

.other {
  background: #263238;
}

/* INPUT */
.input-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #203a43;
  padding: 5px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 50%;
  background: #00c853;
  color: white;
}

/* IMAGE */
.chat-img {
  max-width: 140px;
  border-radius: 10px;
  cursor: pointer;
}

/* PROGRESS */
.progress {
  font-size: 12px;
  color: yellow;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
  <h3>ChatBubble</h3>
</div>

<div class="sidebar" id="sidebar">
  <h4>Users</h4>
  <ul id="users"></ul>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Type message...">
  <input type="file" id="file" style="display:none">
  <button onclick="document.getElementById('file').click()">📎</button>
  <button onclick="send()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let name = localStorage.getItem("name") || prompt("Enter name");
localStorage.setItem("name", name);

socket.emit("join", name);

const chat = document.getElementById("chat");

// ===== add message =====
function addMsg(msg, me=false) {
  const div = document.createElement("div");
  div.className = "msg " + (me ? "me" : "other");

  if (msg.type === "file") {
    div.innerHTML = `<img src="${msg.url}" class="chat-img">`;
  } else {
    div.innerText = msg.user + ": " + msg.text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ===== receive =====
socket.on("message", (msg) => {
  addMsg(msg, msg.user === name);
});

socket.on("oldMessages", (msgs) => {
  msgs.forEach(m => addMsg(m, m.user === name));
});

socket.on("system", (txt) => {
  const d = document.createElement("div");
  d.innerText = txt;
  d.style.textAlign = "center";
  d.style.color = "lightgreen";
  chat.appendChild(d);
});

socket.on("users", (list) => {
  document.getElementById("users").innerHTML =
    list.map(u => `<li>${u}</li>`).join("");
});

// ===== send text =====
function send() {
  const val = msg.value;
  if (!val) return;

  socket.emit("sendMessage", { text: val });
  msg.value = "";
}

// ===== upload =====
document.getElementById("file").onchange = (e) => {
  const file = e.target.files[0];
  const formData = new FormData();
  formData.append("file", file);

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.innerText = "Uploading 0%";
  chat.appendChild(progress);

  const xhr = new XMLHttpRequest();
  xhr.open("POST", "/upload");

  xhr.upload.onprogress = (e) => {
    let percent = Math.round((e.loaded / e.total) * 100);
    progress.innerText = "Uploading " + percent + "%";
  };

  xhr.onload = () => {
    const res = JSON.parse(xhr.response);
    progress.remove();

    socket.emit("sendMessage", {
      type: "file",
      url: res.url
    });
  };

  xhr.send(formData);
};

// ===== sidebar =====
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

// ===== image zoom =====
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("chat-img")) {
    const modal = document.createElement("div");
    modal.style = `
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      background:black;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    `;
    modal.innerHTML = `<img src="${e.target.src}" style="max-width:90%">`;
    modal.onclick = () => modal.remove();
    document.body.appendChild(modal);
  }
});
</script>

</body>
</html>
