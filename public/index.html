<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;

  background:url("https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2") no-repeat center center fixed;
  background-size:cover;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#202c33;
  transition:0.3s;
  padding:10px;
  z-index:2;
}

#sidebar.active{
  left:0;
}

/* MENU BUTTON */
#menuBtn{
  font-size:22px;
  cursor:pointer;
}

/* MAIN */
#main{
  height:100%;
  display:flex;
  flex-direction:column;
  background:rgba(11,20,26,0.8);
}

/* TOP */
#top{
  display:flex;
  align-items:center;
  gap:10px;
  background:#202c33;
  padding:10px;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MSG */
.msg{
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:#005c4b;
  align-self:flex-end;
}

.other{
  background:#202c33;
}

.system{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

/* INPUT */
#inputBox{
  display:flex;
  gap:5px;
  padding:10px;
  background:#202c33;
}

#msg{
  flex:1;
  padding:10px;
}

/* BUTTON */
button{
  background:#00a884;
  color:white;
  border:none;
  padding:10px;
}

/* PROGRESS */
#progressContainer{
  display:none;
  padding:5px;
  background:#111;
}

#progressBar{
  height:10px;
  width:0%;
  background:#00ff9d;
  text-align:center;
  font-size:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>🟢 Users</h3>
  <ul id="users"></ul>
</div>

<!-- MAIN -->
<div id="main">

  <div id="top">
    <span id="menuBtn" onclick="toggleSidebar()">☰</span>
    ChatBubble
  </div>

  <div id="chat"></div>

  <!-- PROGRESS -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <!-- INPUT -->
  <div id="inputBox">
    <input id="msg" placeholder="Type message">
    <input type="file" id="file" onchange="sendImage()">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

let username = localStorage.getItem("username");

if(!username){
  username = prompt("Enter name");
  localStorage.setItem("username", username);
}

socket.emit("join",{name:username});

/* SEND MSG */
function sendMsg(){
  let input=document.getElementById("msg");
  if(!input.value) return;

  socket.emit("message",input.value);
  input.value="";
}

/* SEND IMAGE WITH % */
function sendImage(){
  const file=document.getElementById("file").files[0];
  if(!file) return;

  const bar=document.getElementById("progressBar");
  const container=document.getElementById("progressContainer");

  container.style.display="block";

  const reader=new FileReader();

  reader.onprogress=(e)=>{
    if(e.lengthComputable){
      let percent=Math.round((e.loaded/e.total)*100);
      bar.style.width=percent+"%";
      bar.innerText=percent+"%";
    }
  };

  reader.onload=(e)=>{
    socket.emit("image",e.target.result);

    setTimeout(()=>{
      container.style.display="none";
      bar.style.width="0%";
      bar.innerText="";
    },500);
  };

  reader.readAsDataURL(file);
}

/* UI */
function addMsg(type,text){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function addImage(type,src){
  let div=document.createElement("div");
  div.className="msg "+type;

  let img=document.createElement("img");
  img.src=src;
  img.style.maxWidth="200px";

  div.appendChild(img);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function addSystem(text){
  let div=document.createElement("div");
  div.className="system";
  div.innerText=text;
  chat.appendChild(div);
}

/* RECEIVE */
socket.on("message",data=>{
  if(data.user===username){
    addMsg("me",data.text);
  }else{
    addMsg("other",data.user+": "+data.text);
  }
});

socket.on("image",data=>{
  if(data.user===username){
    addImage("me",data.src);
  }else{
    addImage("other",data.src);
  }
});

socket.on("system",data=>{
  addSystem("🟢 "+data.text);
});

socket.on("users",users=>{
  usersList.innerHTML="";
  Object.values(users).forEach(u=>{
    let li=document.createElement("li");
    li.innerText=u.name;
    usersList.appendChild(li);
  });
});

const chat=document.getElementById("chat");
const usersList=document.getElementById("users");
</script>

</body>
</html>
