<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
}

#chat {
  height:70vh;
  overflow-y:auto;
  padding:10px;
}

.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.me { background:#005c4b; text-align:right; }
.other { background:#202c33; }

#inputBox {
  display:flex;
  position:fixed;
  bottom:0;
  width:100%;
}

input { flex:1; padding:10px; }
button { padding:10px; }

#top {
  background:#202c33;
  padding:10px;
}

#progress {
  height:5px;
  background:green;
  width:0%;
}
</style>

</head>
<body>

<div id="top">
  💬 ChatBubble  
  <div id="rank">Rank: 🥉 Bronze</div>
  <div id="progress"></div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = prompt("Enter your name");
socket.emit("join", username);

// message send
function sendMsg(){
  const msg = document.getElementById("msg").value;
  socket.emit("message", msg);
  addMsg("me", msg);
}

// show msg
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);

  document.getElementById("chat").scrollTop = 999999;
}

// receive msg
socket.on("message", (data) => {
  addMsg("other", data.rank + " " + data.user + ": " + data.text);
  document.getElementById("sound").play();

  updateRank(data.rank);
});

// update rank
function updateRank(rank){
  document.getElementById("rank").innerText = "Rank: " + rank;
}
</script>

</body>
</html>
