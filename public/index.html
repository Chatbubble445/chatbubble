<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatBubble</title>

<style>
body { margin:0; background:#0c1b22; color:white; font-family:sans-serif; }

.chat {
  height:75vh;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg-left {
  background:#1f3a44;
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:70%;
  align-self:flex-start;
}

.msg-right {
  background:#16a34a;
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:70%;
  align-self:flex-end;
}

img {
  max-width:150px;
  border-radius:10px;
}

.inputBox {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#16a34a;
  color:white;
  margin-left:5px;
}

#progress {
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>
<div id="progress"></div>

<div class="inputBox">
  <button onclick="pickFile()">+</button>
  <input id="msg" placeholder="Type message">
  <button onclick="send()">➤</button>
</div>

<input type="file" id="file" hidden onchange="uploadFile()">

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// 🔥 NAME SAVE (FIXED)
let name = localStorage.getItem("name");

if(!name){
  name = prompt("Enter name");
  localStorage.setItem("name", name);
}

socket.emit("join", name);

// SEND MSG
function send(){
  let msg = document.getElementById("msg").value.trim();
  if(!msg) return;

  socket.emit("send", msg);
  document.getElementById("msg").value="";
}

document.getElementById("msg").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") send();
});

// RECEIVE MSG
socket.on("messages",(data)=>{
  let chat = document.getElementById("chat");
  chat.innerHTML="";

  data.forEach(m=>{
    if(m.system){
      chat.innerHTML += `<div style="text-align:center;color:gray">${m.text}</div>`;
    } else {
      let side = m.user===name ? "msg-right" : "msg-left";

      if(m.file){
        chat.innerHTML += `
        <div class="${side}">
          <b>${m.user}</b><br>
          <img src="${m.file}">
        </div>`;
      } else {
        chat.innerHTML += `
        <div class="${side}">
          <b>${m.user}</b><br>
          ${m.text}
        </div>`;
      }
    }
  });

  chat.scrollTop = chat.scrollHeight;
});
