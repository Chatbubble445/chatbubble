<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
}

/* TOP BAR */
#top{
  height:55px;
  background:#202c33;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
}

#menuBtn{font-size:22px;cursor:pointer}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#202c33;
  transition:0.3s;
  z-index:1000;
  padding:10px;
}

#sidebar.active{left:0}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
}

#overlay.active{display:block}

/* CHAT */
#chat{
  height:calc(100vh - 115px);
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.me{background:#005c4b;align-self:flex-end}
.other{background:#202c33}

.system{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

/* IMAGE */
.chat-img{
  width:120px;
  border-radius:10px;
  cursor:pointer;
}

/* INPUT */
#inputBox{
  height:60px;
  display:flex;
  padding:8px;
  gap:5px;
  background:#202c33;
}

#msg{
  flex:1;
  border-radius:20px;
  border:none;
  padding:10px;
}

#sendBtn{
  width:45px;
  border:none;
  border-radius:50%;
  background:#00a884;
  color:white;
}

/* PROGRESS */
#progress{
  position:fixed;
  bottom:70px;
  left:10px;
  background:#00a884;
  padding:5px 10px;
  border-radius:5px;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img{
  max-width:90%;
}

#closeBtn{
  margin-top:10px;
  padding:8px 20px;
  background:red;
  border:none;
}

</style>
</head>

<body>

<div id="top">
  <span id="menuBtn">☰ ChatBubble</span>
  <div>💬 🔔 👤</div>
</div>

<div id="overlay"></div>

<div id="sidebar">
  <h3>Users</h3>
  <ul id="users"></ul>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message...">
  <input type="file" id="file" accept="image/*,image/gif" hidden>
  <button onclick="file.click()">📎</button>
  <button id="sendBtn">➤</button>
</div>

<div id="viewer">
  <img id="fullImg">
  <button id="closeBtn">Close</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const chat = document.getElementById("chat");

/* USER */
let username = localStorage.getItem("username");
if(!username){
  username = prompt("Enter name") || "Guest";
  localStorage.setItem("username", username);
}
socket.emit("join",{name:username});

/* SIDEBAR */
menuBtn.onclick=()=>{
  sidebar.classList.add("active");
  overlay.classList.add("active");
};
overlay.onclick=()=>{
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
};

/* MESSAGE */
sendBtn.onclick=()=>{
  let text=msg.value.trim();
  if(!text)return;
  socket.emit("message",text);
  msg.value="";
};

/* TYPING */
msg.oninput=()=>{
  socket.emit("typing",username);
};

/* ADD MSG */
function addMsg(type,text){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* IMAGE */
function addImage(type,src){
  let d=document.createElement("div");
  d.className="msg "+type;

  let img=document.createElement("img");
  img.src=src;
  img.className="chat-img";

  img.onclick=()=>{
    viewer.style.display="flex";
    fullImg.src=src;
  };

  d.appendChild(img);
  chat.appendChild(d);
}

/* UPLOAD */
file.onchange=()=>{
  let f=file.files[0];
  let xhr=new XMLHttpRequest();
  let form=new FormData();

  form.append("file",f);
  form.append("user",username);

  xhr.upload.onprogress=(e)=>{
    let p=Math.round((e.loaded/e.total)*100);
    showProgress(p);
  };

  xhr.onload=()=>showProgress(0);

  xhr.open("POST","/upload");
  xhr.send(form);
};

/* PROGRESS */
function showProgress(p){
  let bar=document.getElementById("progress");

  if(p===0){
    if(bar)bar.remove();
    return;
  }

  if(!bar){
    bar=document.createElement("div");
    bar.id="progress";
    document.body.appendChild(bar);
  }

  bar.innerText="Uploading "+p+"%";
}

/* VIEWER */
closeBtn.onclick=()=>viewer.style.display="none";
viewer.onclick=e=>{
  if(e.target===viewer) viewer.style.display="none";
};

/* SOCKET */
socket.on("message",d=>{
  addMsg(d.user===username?"me":"other", d.user+": "+d.text);
});

socket.on("image",d=>{
  addImage(d.user===username?"me":"other", d.src);
});

socket.on("typing",u=>{
  let t=document.getElementById("typing");
  if(!t){
    t=document.createElement("div");
    t.id="typing";
    t.className="system";
    chat.appendChild(t);
  }
  t.innerText=u+" is typing...";
  setTimeout(()=>t.remove(),1000);
});

socket.on("system",d=>{
  let div=document.createElement("div");
  div.className="system";
  div.innerText=d.text;
  chat.appendChild(div);
});

socket.on("users",u=>{
  users.innerHTML="";
  Object.values(u).forEach(x=>{
    let li=document.createElement("li");
    li.innerText=x.name;
    users.appendChild(li);
  });
});

</script>

</body>
</html>
