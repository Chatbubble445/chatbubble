<!DOCTYPE html>
<html>
<head>
  <title>ChatBubble</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0b141a;
      color: white;
    }

    #sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      width: 250px;
      height: 100%;
      background: #202c33;
      transition: 0.3s;
      padding: 10px;
      z-index: 20;
      overflow-y: auto;
    }

    #sidebar.active {
      left: 0;
    }

    #users {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #users li {
      padding: 10px 8px;
      border-bottom: 1px solid #2f3b43;
    }

    #main {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: rgba(11, 20, 26, 0.96);
    }

    #top {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: #202c33;
      flex-shrink: 0;
    }

    #topLeft {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    #menuBtn {
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }

    #topRight {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }

    #chatWrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #chat {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 12px;
      border-radius: 12px;
      word-break: break-word;
      line-height: 1.35;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .other {
      background: #202c33;
      align-self: flex-start;
    }

    .system {
      align-self: center;
      color: #aab7bf;
      font-size: 12px;
      padding: 4px 8px;
    }

    .mediaBox {
      max-width: 220px;
      padding: 6px;
    }

    .mediaBox img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    #typing {
      min-height: 18px;
      padding: 0 12px 8px;
      font-size: 12px;
      color: #b6c3ca;
      background: #0b141a;
    }

    #progressContainer {
      display: none;
      padding: 8px 12px;
      background: #111b21;
      border-top: 1px solid #1d2a31;
    }

    #progressText {
      font-size: 12px;
      margin-bottom: 6px;
      color: #d7e0e5;
    }

    #progressTrack {
      width: 100%;
      height: 8px;
      background: #2a3942;
      border-radius: 999px;
      overflow: hidden;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #00a884;
      transition: width 0.1s linear;
    }

    #inputBox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #202c33;
      flex-shrink: 0;
    }

    .iconBtn {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 20px;
    }

    #msg {
      flex: 1;
      min-width: 0;
      padding: 10px 14px;
      border: none;
      border-radius: 22px;
      outline: none;
      font-size: 14px;
    }

    #sendBtn {
      background: #00a884;
      color: white;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #file {
      display: none;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>🟢 Users</h3>
    <ul id="users"></ul>
  </div>

  <div id="main">
    <div id="top">
      <div id="topLeft">
        <span id="menuBtn">☰</span>
        <span>ChatBubble</span>
      </div>
      <div id="topRight">
        <span>💬</span>
        <span>🔔</span>
        <span>👤</span>
      </div>
    </div>

    <div id="chatWrap">
      <div id="chat"></div>
    </div>

    <div id="typing"></div>

    <div id="progressContainer">
      <div id="progressText">Uploading... 0%</div>
      <div id="progressTrack">
        <div id="progressBar"></div>
      </div>
    </div>

    <div id="inputBox">
      <button class="iconBtn" type="button">😊</button>
      <input id="msg" placeholder="Type here..." oninput="typing()" />
      <input type="file" id="file" accept="image/*,.gif" onchange="sendImage()" />
      <button class="iconBtn" type="button" onclick="openPicker()">📎</button>
      <button id="sendBtn" type="button" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    const chat = document.getElementById("chat");
    const usersList = document.getElementById("users");
    const typingBox = document.getElementById("typing");
    const msgInput = document.getElementById("msg");
    const fileInput = document.getElementById("file");
    const progressContainer = document.getElementById("progressContainer");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");

    menuBtn.onclick = function (e) {
      e.stopPropagation();
      sidebar.classList.toggle("active");
    };

    document.addEventListener("click", function (e) {
      if (sidebar.classList.contains("active") && !sidebar.contains(e.target) && e.target !== menuBtn) {
        sidebar.classList.remove("active");
      }
    });

    sidebar.addEventListener("click", function (e) {
      e.stopPropagation();
    });

    let username = localStorage.getItem("username");
    if (!username) {
      username = prompt("Enter name") || "Guest" + Math.floor(Math.random() * 1000);
      localStorage.setItem("username", username);
    }

    socket.emit("join", { name: username });

    function scrollDown() {
      chat.scrollTop = chat.scrollHeight;
    }

    function addMsg(type, text) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      scrollDown();
    }

    function addImage(type, src) {
      const box = document.createElement("div");
      box.className = "msg mediaBox " + type;

      const img = document.createElement("img");
      img.src = src;
      img.alt = "shared image";

      box.appendChild(img);
      chat.appendChild(box);
      scrollDown();
    }

    function addSystem(text) {
      const div = document.createElement("div");
      div.className = "system";
      div.textContent = text;
      chat.appendChild(div);
      scrollDown();
    }

    function sendMsg() {
      const text = msgInput.value.trim();
      if (!text) return;
      socket.emit("message", text);
      msgInput.value = "";
    }

    function openPicker() {
      fileInput.click();
    }

    function sendImage() {
      const file = fileInput.files[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        alert("Sirf image ya GIF upload karo.");
        fileInput.value = "";
        return;
      }

      progressContainer.style.display = "block";
      progressBar.style.width = "0%";
      progressText.textContent = "Uploading... 0%";

      const reader = new FileReader();

      reader.onprogress = function (e) {
        if (e.lengthComputable) {
          const percent = Math.round((e.loaded / e.total) * 100);
          progressBar.style.width = percent + "%";
          progressText.textContent = "Uploading... " + percent + "%";
        }
      };

      reader.onloadstart = function () {
        progressBar.style.width = "0%";
        progressText.textContent = "Uploading... 0%";
      };

      reader.onload = function (e) {
        progressBar.style.width = "100%";
        progressText.textContent = "Uploading... 100%";
        socket.emit("image", e.target.result);

        setTimeout(() => {
          progressContainer.style.display = "none";
          progressBar.style.width = "0%";
          progressText.textContent = "Uploading... 0%";
          fileInput.value = "";
        }, 700);
      };

      reader.onerror = function () {
        alert("Image upload failed.");
        progressContainer.style.display = "none";
        progressBar.style.width = "0%";
        progressText.textContent = "Uploading... 0%";
        fileInput.value = "";
      };

      reader.readAsDataURL(file);
    }

    let typingTimeout;

    function typing() {
      socket.emit("typing", username);
    }

    socket.on("typing", function (name) {
      if (name !== username) {
        typingBox.textContent = name + " is typing...";
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          typingBox.textContent = "";
        }, 1200);
      }
    });

    socket.on("message", function (data) {
      if (data.user === username) {
        addMsg("me", data.text);
      } else {
        addMsg("other", data.user + ": " + data.text);
      }
    });

    socket.on("image", function (data) {
      if (data.user === username) {
        addImage("me", data.src);
      } else {
        addImage("other", data.user ? data.user + "'s image" : "image");
        chat.lastChild.innerHTML = '<img src="' + data.src + '" alt="shared image">';
      }
    });

    socket.on("system", function (data) {
      addSystem("🟢 " + data.text);
    });

    socket.on("users", function (users) {
      usersList.innerHTML = "";
      Object.values(users).forEach(function (u) {
        const li = document.createElement("li");
        li.textContent = u.name;
        usersList.appendChild(li);
      });
    });
  </script>
</body>
</html>
