<!DOCTYPE html>
<html>
<head>
  <title>ChatBubble</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      display:flex;
      flex-direction:column;
      background:#0b141a;
      font-family:sans-serif;
      color:white;
    }

    #top {
      height:50px;
      background:#202c33;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
    }

    #menuBtn { cursor:pointer; font-size:22px; }

    #chat {
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .msg {
      padding:10px;
      border-radius:10px;
      max-width:75%;
    }

    .me { background:#005c4b; align-self:flex-end; }
    .other { background:#202c33; align-self:flex-start; }

    .system {
      text-align:center;
      font-size:12px;
      color:#aaa;
    }

    /* 🔥 IMAGE SMALL PREVIEW */
    .chat-img {
      max-width:120px;
      border-radius:10px;
      cursor:pointer;
    }

    /* FULL VIEW */
    #viewer {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:100;
    }

    #viewer img {
      max-width:90%;
      max-height:90%;
    }

    #inputBox {
      display:flex;
      gap:5px;
      padding:8px;
      background:#202c33;
    }

    #msg {
      flex:1;
      padding:10px;
      border:none;
      border-radius:20px;
    }

    #sendBtn {
      width:40px;
      border:none;
      border-radius:50%;
      background:#00a884;
      color:white;
    }

    #file { display:none; }

  </style>
</head>

<body>

<div id="top">
  <span id="menuBtn">☰ ChatBubble</span>
  <div>💬 🔔 👤</div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message..." />
  <input type="file" id="file" accept="image/*" onchange="sendImage()" />
  <button onclick="pick()">📎</button>
  <button id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<!-- FULL IMAGE VIEW -->
<div id="viewer" onclick="this.style.display='none'">
  <img id="fullImg">
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const chat = document.getElementById("chat");
const msgInput = document.getElementById("msg");

let username = localStorage.getItem("username");
if(!username){
  username = prompt("Enter name") || "Guest";
  localStorage.setItem("username", username);
}

socket.emit("join", { name: username });

function scrollDown(){
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(type,text){
  let div = document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  scrollDown();
}

/* 🔥 IMAGE PREVIEW + CLICK FULL */
function addImage(type,src){
  let div = document.createElement("div");
  div.className="msg "+type;

  let img = document.createElement("img");
  img.src = src;
  img.className = "chat-img";

  img.onclick = ()=>{
    document.getElementById("viewer").style.display="flex";
    document.getElementById("fullImg").src = src;
  };

  div.appendChild(img);
  chat.appendChild(div);
  scrollDown();
}

function sendMsg(){
  let text = msgInput.value.trim();
  if(!text) return;
  socket.emit("message", text);
  msgInput.value="";
}

/* 🔥 FAST IMAGE SEND (COMPRESS) */
function sendImage(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let img = new Image();
  let reader = new FileReader();

  reader.onload = function(e){
    img.src = e.target.result;
  };

  img.onload = function(){
    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    let maxWidth = 400; // 🔥 compression size
    let scale = maxWidth / img.width;

    canvas.width = maxWidth;
    canvas.height = img.height * scale;

    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    let compressed = canvas.toDataURL("image/jpeg",0.6); // 🔥 compression
    socket.emit("image", compressed);
  };

  reader.readAsDataURL(file);
}

function pick(){
  document.getElementById("file").click();
}

/* SOCKET */

socket.on("message",(data)=>{
  if(data.user===username){
    addMsg("me",data.text);
  } else {
    addMsg("other",data.user+": "+data.text);
  }
});

socket.on("image",(data)=>{
  if(data.user===username){
    addImage("me",data.src);
  } else {
    addImage("other",data.src);
  }
});

socket.on("system",(data)=>{
  let div=document.createElement("div");
  div.className="system";
  div.innerText=data.text;
  chat.appendChild(div);
});

</script>

</body>
</html>
