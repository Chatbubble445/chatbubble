<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
  display:flex;
  height:100vh;
}

/* LEFT USERS */
#sidebar {
  width:250px;
  background:#202c33;
  overflow-y:auto;
  padding:10px;
  border-right:1px solid #333;
}

#sidebar h3 {
  margin-top:0;
}

#users li {
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

#users li:hover {
  background:#2a3942;
}

/* RIGHT CHAT */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Top */
#top {
  background:#202c33;
  padding:10px;
  font-weight:bold;
}

/* Chat */
#chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* Messages */
.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
  word-wrap:break-word;
}

.me {
  background:#005c4b;
  align-self:flex-end;
}

.other {
  background:#202c33;
  align-self:flex-start;
}

.system {
  text-align:center;
  color:gray;
  font-size:12px;
}

/* Input */
#inputBox {
  display:flex;
  padding:10px;
  background:#202c33;
  gap:5px;
}

#msg {
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  padding:10px;
  background:#00a884;
  color:white;
  border:none;
  border-radius:5px;
}

/* Progress */
#progressContainer {
  display:none;
  background:#202c33;
  padding:5px;
}

#progressBar {
  height:8px;
  width:0%;
  background:#00a884;
}
</style>

</head>

<body>

<!-- LEFT -->
<div id="sidebar">
  <h3>🟢 Users</h3>
  <ul id="users"></ul>
</div>

<!-- RIGHT -->
<div id="main">

  <div id="top">ChatBubble</div>

  <div id="chat"></div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message">
    <input type="file" id="file" onchange="sendImage()">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = localStorage.getItem("username");

if(!username){
  username = prompt("Enter name");
  localStorage.setItem("username", username);
}

socket.emit("join", {name: username});

// send text
function sendMsg(){
  const input = document.getElementById("msg");
  if(!input.value) return;

  socket.emit("message", input.value);
  input.value = "";
}

// send image + %
function sendImage(){
  const file = document.getElementById("file").files[0];
  if(!file) return;

  const bar = document.getElementById("progressBar");
  const container = document.getElementById("progressContainer");

  container.style.display = "block";

  const reader = new FileReader();

  reader.onprogress = (e)=>{
    if(e.lengthComputable){
      let percent = (e.loaded/e.total)*100;
      bar.style.width = percent + "%";
    }
  };

  reader.onload = (e)=>{
    socket.emit("image", e.target.result);

    setTimeout(()=>{
      container.style.display="none";
      bar.style.width="0%";
    },500);
  };

  reader.readAsDataURL(file);
}

// UI
function addMsg(type,text){
  const div = document.createElement("div");
  div.className = "msg "+type;
  div.innerText = text;
  chat.appendChild(div);
  scrollDown();
}

function addImage(type,src){
  const div = document.createElement("div");
  div.className = "msg "+type;

  const img = document.createElement("img");
  img.src = src;
  img.style.maxWidth="200px";

  div.appendChild(img);
  chat.appendChild(div);
  scrollDown();
}

function addSystem(text){
  const div = document.createElement("div");
  div.className = "system";
  div.innerText = text;
  chat.appendChild(div);
}

function scrollDown(){
  chat.scrollTop = chat.scrollHeight;
}

// receive
socket.on("message", data=>{
  if(data.user===username){
    addMsg("me",data.text);
  }else{
    addMsg("other",data.user+": "+data.text);
  }
});

socket.on("image", data=>{
  if(data.user===username){
    addImage("me",data.src);
  }else{
    addImage("other",data.src);
  }
});

socket.on("system", data=>addSystem(data.text));

socket.on("users", users=>{
  usersList.innerHTML="";
  Object.values(users).forEach(u=>{
    const li=document.createElement("li");
    li.innerText=u.name;
    usersList.appendChild(li);
  });
});

const chat=document.getElementById("chat");
const usersList=document.getElementById("users");
</script>

</body>
</html>
