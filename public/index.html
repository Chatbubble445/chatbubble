<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBubble</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1c24;
  overflow:hidden;
}

/* HEADER */
.header{
  height:50px;
  background:#1f2f38;
  color:white;
  display:flex;
  align-items:center;
  padding:0 10px;
  justify-content:space-between;
}

.menu{
  font-size:22px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-220px;
  top:0;
  width:220px;
  height:100%;
  background:#18262e;
  transition:0.3s;
  padding:10px;
  z-index:10;
}

.sidebar.active{
  left:0;
}

/* CHAT */
.chat{
  position:absolute;
  top:50px;
  bottom:60px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:10px;
}

/* MESSAGE */
.msg{
  max-width:70%;
  padding:8px;
  margin:5px;
  border-radius:10px;
}

.me{
  background:#00a884;
  margin-left:auto;
}

.other{
  background:#23343c;
}

/* IMAGE */
.chat-img{
  max-width:150px;
  border-radius:10px;
  cursor:pointer;
}

/* INPUT */
.input{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#1f2f38;
  display:flex;
  align-items:center;
  padding:5px;
}

.input input{
  flex:1;
  height:40px;
  border:none;
  border-radius:20px;
  padding:0 10px;
}

.send{
  background:#00a884;
  border:none;
  color:white;
  padding:10px;
  border-radius:50%;
  margin-left:5px;
}

/* PROGRESS */
.progress{
  position:absolute;
  bottom:65px;
  left:10px;
  color:white;
}

/* IMAGE VIEW */
.viewer{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:90%;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu" onclick="toggleSidebar()">☰ ChatBubble</div>
  <div>💬 🔔 👤</div>
</div>

<div id="sidebar" class="sidebar">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="chat" class="chat"></div>

<div class="progress" id="progress"></div>

<div class="input">
  <input id="msg" placeholder="Type message...">
  <input type="file" id="file">
  <button class="send" onclick="send()">➤</button>
</div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
  <img id="fullImg">
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let username = localStorage.getItem("name") || prompt("Enter name");

localStorage.setItem("name", username);
socket.emit("join", {name: username});

let chat = document.getElementById("chat");
let usersDiv = document.getElementById("users");
let progress = document.getElementById("progress");
let viewer = document.getElementById("viewer");
let fullImg = document.getElementById("fullImg");

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* SEND MSG */
function send(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  socket.emit("message", msg);
  addMsg("me", username + ": " + msg);

  document.getElementById("msg").value="";
}

/* RECEIVE MSG */
socket.on("message", data=>{
  addMsg("other", data.user + ": " + data.text);
});

/* USERS */
socket.on("users", data=>{
  usersDiv.innerHTML="";
  Object.values(data).forEach(u=>{
    let d=document.createElement("div");
    d.innerText=u.name;
    usersDiv.appendChild(d);
  });
});

/* SYSTEM */
socket.on("system", d=>{
  addMsg("other", d.text);
});

/* IMAGE RECEIVE */
socket.on("image", d=>{
  addImage("other", d.src);
});

/* ADD MSG */
function addMsg(type,text){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* ADD IMAGE */
function addImage(type,src){
  let d=document.createElement("div");
  d.className="msg "+type;

  let img=document.createElement("img");
  img.src=src;
  img.className="chat-img";

  img.onclick=()=>{
    viewer.style.display="flex";
    fullImg.src=src;
  };

  d.appendChild(img);
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* FILE UPLOAD */
document.getElementById("file").onchange=()=>{
  let f=document.getElementById("file").files[0];
  if(!f) return;

  let xhr=new XMLHttpRequest();
  let form=new FormData();

  form.append("file",f);
  form.append("user",username);

  xhr.upload.onprogress=(e)=>{
    let p=Math.round((e.loaded/e.total)*100);
    progress.innerText="Uploading "+p+"%";
  };

  xhr.onload=()=>{
    progress.innerText="";
  };

  xhr.open("POST","/upload");
  xhr.send(form);
};
</script>

</body>
</html>
