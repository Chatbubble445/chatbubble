<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body { margin:0; font-family: Arial; background:#0b141a; color:white; }

/* Sidebar */
#sidebar {
  width:250px;
  background:#202c33;
  position:fixed;
  left:-260px;
  top:0;
  height:100%;
  transition:0.3s;
  z-index:100;
  padding:10px;
}
#sidebar.open { left:0; }

#users li { padding:10px; border-bottom:1px solid #333; }

/* Top */
#top {
  background:#202c33;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menuBtn { font-size:20px; cursor:pointer; }

.icon { margin-left:10px; cursor:pointer; }

/* Chat */
#chat {
  height:calc(100vh - 110px);
  overflow-y:auto;
  padding:10px;
}

.msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
.me { background:#005c4b; margin-left:auto; }
.other { background:#202c33; }

.system { text-align:center; color:gray; font-size:12px; margin:5px; }

/* Input */
#inputBox {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:5px;
  padding:8px;
  background:#202c33;
}

#msg {
  flex:1;
  padding:8px;
  border:none;
  border-radius:5px;
}

#file { width:90px; }

button {
  padding:8px 12px;
  background:#00a884;
  color:white;
  border:none;
  border-radius:5px;
}
</style>

</head>
<body>

<div id="sidebar">
  <h3>🟢 Online Users</h3>
  <ul id="users"></ul>
</div>

<div id="top">
  <div>
    <span class="menuBtn" onclick="toggleSidebar()">☰</span>
    ChatBubble
  </div>

  <div>
    <span class="icon">💬</span>
    <span class="icon" onclick="logout()">🚪</span>
  </div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message">
  <input type="file" id="file" accept="image/*" onchange="sendImage()">
  <button onclick="sendMsg()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// 🔥 username save
let username = localStorage.getItem("username");

if(!username){
  username = prompt("Enter name") || "Guest" + Math.floor(Math.random()*1000);
  localStorage.setItem("username", username);
}

// join
socket.emit("join", {name: username, room: "global"});

// sidebar
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

// close outside
document.addEventListener("click", function(e){
  const sidebar = document.getElementById("sidebar");
  const btn = document.querySelector(".menuBtn");

  if(!sidebar.contains(e.target) && !btn.contains(e.target)){
    sidebar.classList.remove("open");
  }
});

// logout
function logout(){
  localStorage.removeItem("username");
  location.reload();
}

// send msg
function sendMsg(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  socket.emit("message", msg);
  document.getElementById("msg").value = "";
}

// send image
function sendImage(){
  const file = document.getElementById("file").files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e => socket.emit("image", e.target.result);
  reader.readAsDataURL(file);
}

// UI functions
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  scrollDown();
}

function addImage(type, src){
  const div = document.createElement("div");
  div.className = "msg " + type;
  const img = document.createElement("img");
  img.src = src;
  div.appendChild(img);
  chat.appendChild(div);
  scrollDown();
}

function addSystem(text){
  const div = document.createElement("div");
  div.className = "system";
  div.innerText = text;
  chat.appendChild(div);
  scrollDown();
}

function scrollDown(){
  chat.scrollTop = chat.scrollHeight;
}

// receive
socket.on("message", data => {
  if(data.user === username){
    addMsg("me", data.text);
  } else {
    addMsg("other", data.user + ": " + data.text);
  }
});

socket.on("image", data => {
  if(data.user === username){
    addImage("me", data.src);
  } else {
    addImage("other", data.src);
  }
});

socket.on("system", data => addSystem(data.text));

socket.on("users", users => {
  usersList.innerHTML = "";
  Object.values(users).forEach(u => {
    const li = document.createElement("li");
    li.innerText = u.name;
    usersList.appendChild(li);
  });
});

// refs
const chat = document.getElementById("chat");
const usersList = document.getElementById("users");
</script>

</body>
</html>
