<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
}

/* TOP */
#top{
  height:50px;
  background:#202c33;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
}

#menuBtn{cursor:pointer;font-size:22px}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#202c33;
  transition:0.3s;
  z-index:1000;
  padding:10px;
}

#sidebar.active{
  left:0;
}

#overlay.active{
  display:block;
}

/* CHAT */
#chat{
  height:calc(100vh - 110px);
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.me{background:#005c4b;align-self:flex-end;}
.other{background:#202c33;}

.system{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

/* IMAGE */
.chat-img{
  width:120px;
  border-radius:10px;
  cursor:pointer;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:2000;
}

#viewer img{
  max-width:90%;
  max-height:80%;
}

#closeBtn{
  margin-top:15px;
  padding:10px 20px;
  background:red;
  border:none;
  color:white;
}

/* INPUT */
#inputBox{
  height:60px;
  display:flex;
  gap:5px;
  padding:8px;
  background:#202c33;
}

#msg{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

#sendBtn{
  width:45px;
  border:none;
  border-radius:50%;
  background:#00a884;
  color:white;
}

#file{display:none;}

</style>
</head>

<body>

<div id="top">
  <span id="menuBtn">☰ ChatBubble</span>
  <div>💬 🔔 👤</div>
</div>

<div id="overlay"></div>

<div id="sidebar">
  <h3>Users</h3>
  <ul id="users"></ul>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message...">
  <input type="file" id="file" accept="image/*,image/gif">
  <button onclick="pick()">📎</button>
  <button id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<!-- VIEWER -->
<div id="viewer">
  <img id="fullImg">
  <button id="closeBtn">Close</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const chat = document.getElementById("chat");

/* USER */
let username = localStorage.getItem("username");
if(!username){
  username = prompt("Enter name") || "Guest";
  localStorage.setItem("username", username);
}
socket.emit("join",{name:username});

/* SIDEBAR FIX */
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

document.getElementById("menuBtn").onclick=()=>{
  sidebar.classList.add("active");
  overlay.classList.add("active");
};

overlay.onclick=()=>{
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
};

/* MESSAGE */
function addMsg(type,text){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* IMAGE / GIF */
function addImage(type,src){
  let div=document.createElement("div");
  div.className="msg "+type;

  let img=document.createElement("img");
  img.src=src;

  // 🔥 GIF FIX → force reload
  img.onload=()=>{ img.src = src; }

  img.className="chat-img";

  img.onclick=()=>{
    viewer.style.display="flex";
    fullImg.src=src;
  };

  div.appendChild(img);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* SEND MSG */
function sendMsg(){
  let text=msg.value.trim();
  if(!text)return;
  socket.emit("message",text);
  msg.value="";
}

/* FILE PICK */
function pick(){
  file.click();
}

/* 🔥 GIF + IMAGE FIX */
file.onchange=()=>{
  let f=file.files[0];
  if(!f)return;

  let reader=new FileReader();

  reader.onload=e=>{
    // GIF direct send (no compress)
    if(f.type==="image/gif"){
      socket.emit("image", e.target.result);
    }else{
      // image compress
      let img=new Image();
      img.onload=()=>{
        let canvas=document.createElement("canvas");
        let ctx=canvas.getContext("2d");

        let scale=400/img.width;
        canvas.width=400;
        canvas.height=img.height*scale;

        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        socket.emit("image", canvas.toDataURL("image/jpeg",0.6));
      };
      img.src=e.target.result;
    }
  };

  reader.readAsDataURL(f);
};

/* VIEWER CLOSE FIX */
const viewer=document.getElementById("viewer");
const fullImg=document.getElementById("fullImg");

document.getElementById("closeBtn").onclick=()=>{
  viewer.style.display="none";
};

viewer.onclick=(e)=>{
  if(e.target===viewer){
    viewer.style.display="none";
  }
};

/* SOCKET */
socket.on("message",(d)=>{
  addMsg(d.user===username?"me":"other", d.user+": "+d.text);
});

socket.on("image",(d)=>{
  addImage(d.user===username?"me":"other", d.src);
});

socket.on("system",(d)=>{
  let div=document.createElement("div");
  div.className="system";
  div.innerText=d.text;
  chat.appendChild(div);
});

socket.on("users",(u)=>{
  let ul=document.getElementById("users");
  ul.innerHTML="";
  Object.values(u).forEach(user=>{
    let li=document.createElement("li");
    li.innerText=user.name;
    ul.appendChild(li);
  });
});

</script>

</body>
</html>
