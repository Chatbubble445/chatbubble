<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBubble</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1d26;
  color:white;
}

/* HEADER */
.header {
  background:#1e2f38;
  padding:12px;
  display:flex;
  align-items:center;
}

.menu {
  font-size:22px;
  margin-right:10px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:-220px;
  top:0;
  width:200px;
  height:100%;
  background:#24343d;
  padding:10px;
  transition:0.3s;
}

.sidebar.active {
  left:0;
}

/* CHAT */
.chat {
  height:80vh;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:6px;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me {
  background:#00c853;
  margin-left:auto;
}

.other {
  background:#37474f;
}

img {
  max-width:150px;
  border-radius:10px;
}

/* INPUT */
.inputBox {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1e2f38;
  padding:5px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  background:#00c853;
  border:none;
  padding:10px;
  border-radius:50%;
  margin-left:5px;
  cursor:pointer;
}

.progress {
  height:5px;
  background:lime;
}
</style>

</head>

<body>

<div class="header">
  <div class="menu" onclick="toggleSidebar()">☰</div>
  ChatBubble
</div>

<div id="sidebar" class="sidebar"></div>

<div id="chat" class="chat"></div>

<div id="progress"></div>

<div class="inputBox">
  <input id="msg" placeholder="Type message">
  <input type="file" id="file">
  <button onclick="send()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io(window.location.origin);

let name = prompt("Enter name");
socket.emit("join", name);

// ===== Sidebar =====
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

// ===== Users =====
socket.on("users", (users)=>{
  document.getElementById("sidebar").innerHTML =
    "<h3>Users</h3>" + users.map(u => "<p>"+u+"</p>").join("");
});

// ===== Messages =====
socket.on("messages", (msgs)=>{
  let chat = document.getElementById("chat");
  chat.innerHTML = "";

  msgs.forEach(m=>{
    let div = document.createElement("div");

    if(m.system){
      div.innerHTML = m.text;
    }
    else if(m.file){
      div.className = "msg " + (m.user===name?"me":"other");

      if(m.file.endsWith(".gif")){
        div.innerHTML = "<b>"+m.user+":</b><br><img src='"+m.file+"'>";
      } else {
        div.innerHTML = "<b>"+m.user+":</b><br><img src='"+m.file+"'>";
      }
    }
    else{
      div.className = "msg " + (m.user===name?"me":"other");
      div.innerHTML = "<b>"+m.user+":</b> "+m.text;
    }

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

// ===== Send Msg =====
function send(){
  let msg = document.getElementById("msg").value;
  if(msg){
    socket.emit("send", msg);
    document.getElementById("msg").value="";
  }

  uploadFile();
}

// ===== Upload =====
function uploadFile(){
  let fileInput = document.getElementById("file");
  let file = fileInput.files[0];
  if(!file) return;

  let form = new FormData();
  form.append("file", file);

  let xhr = new XMLHttpRequest();

  xhr.upload.onprogress = (e)=>{
    let percent = Math.round((e.loaded/e.total)*100);
    document.getElementById("progress").innerHTML =
      "<div class='progress' style='width:"+percent+"%'></div>";
  };

  xhr.onload = ()=>{
    let res = JSON.parse(xhr.response);
    socket.emit("file", res.file);
    document.getElementById("progress").innerHTML="";
  };

  xhr.open("POST","/upload");
  xhr.send(form);
}
</script>

</body>
</html>
