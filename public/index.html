<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatBubble</title>

<style>
body { margin:0; background:#0c1b22; color:white; font-family:sans-serif; }

.topbar {
  background:#1f3a44;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu { font-size:22px; cursor:pointer; }

.sidebar {
  position:fixed;
  top:0;
  left:-200px;
  width:200px;
  height:100%;
  background:#1f3a44;
  padding:10px;
  transition:0.3s;
}

.sidebar.open { left:0; }

.chat {
  height:70vh;
  overflow:auto;
  padding:10px;
}

.msg {
  background:#1f3a44;
  margin:5px;
  padding:8px;
  border-radius:10px;
}

.inputBox {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#16a34a;
  color:white;
  margin-left:5px;
}

img { max-width:150px; border-radius:10px; }
</style>
</head>

<body>

<div class="topbar">
  <span class="menu" onclick="toggleSidebar()">☰</span>
  <b>ChatBubble</b>
  <button onclick="logout()">⎋</button>
</div>

<div class="sidebar" id="sidebar">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="chat" id="chat"></div>
<div id="progress"></div>

<div class="inputBox">
  <button onclick="pickFile()">+</button>
  <input id="msg" placeholder="Type message">
  <button onclick="send()">➤</button>
</div>

<input type="file" id="file" hidden onchange="uploadFile()">

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// LOGIN
let name = localStorage.getItem("name");
if (!name) {
  name = prompt("Enter name");
  localStorage.setItem("name", name);
}
socket.emit("join", name);

// SEND
function send(){
  let input = document.getElementById("msg");
  let msg = input.value.trim();
  if(!msg) return;

  socket.emit("message", msg);
  input.value="";
}

// ENTER SEND
document.getElementById("msg").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") send();
});

// RECEIVE
socket.on("messages",(msgs)=>{
  let chat = document.getElementById("chat");
  chat.innerHTML="";

  msgs.forEach(m=>{
    chat.innerHTML += `
    <div class="msg">
      <b>${m.user || ""}</b><br>
      ${m.text || ""}
      ${m.file ? `<br><img src="${m.file}">` : ""}
    </div>`;
  });

  chat.scrollTop = chat.scrollHeight;
});

// USERS
socket.on("users",(users)=>{
  let list = document.getElementById("users");
  list.innerHTML="";

  users.forEach(u=>{
    list.innerHTML += `<div>${u}</div>`;
  });
});

// FILE
function pickFile(){
  document.getElementById("file").click();
}

function uploadFile(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let form = new FormData();
  form.append("file", file);

  let xhr = new XMLHttpRequest();

  xhr.upload.onprogress = (e)=>{
    let p = Math.round((e.loaded/e.total)*100);
    document.getElementById("progress").innerText = p + "%";
  };

  xhr.onload = ()=>{
    let res = JSON.parse(xhr.responseText);
    socket.emit("file", res.url);
    document.getElementById("progress").innerText="";
  };

  xhr.open("POST","/upload");
  xhr.send(form);
}

// SIDEBAR FIX
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

// LOGOUT FIX
function logout(){
  localStorage.removeItem("name");
  location.reload();
}
</script>

</body>
</html>
