<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatBubble</title>

<style>
body { margin:0; font-family:sans-serif; background:#0c1b22; color:white; }

.topbar {
  background:#1f3a44;
  padding:10px;
  display:flex;
  align-items:center;
}

.menu { font-size:20px; cursor:pointer; }

.sidebar {
  position:fixed;
  left:-220px;
  top:0;
  width:200px;
  height:100%;
  background:#2b3e46;
  padding:15px;
  transition:0.3s;
}

.sidebar.active { left:0; }

.chat {
  height:80vh;
  overflow:auto;
  padding:10px;
}

.msg {
  background:#16a34a;
  padding:8px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
  margin-left:auto;
}

.inputBox {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  margin-left:5px;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  background:#16a34a;
  color:white;
}

img {
  max-width:150px;
  border-radius:10px;
  cursor:pointer;
}

#progress {
  font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <span class="menu" onclick="toggle()">☰</span>
  <span style="margin-left:10px;">ChatBubble</span>
</div>

<div class="sidebar" id="sidebar">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="chat" id="chat"></div>

<div id="progress"></div>

<div class="inputBox">
  <button onclick="openFile()">+</button>
  <input id="msg" placeholder="Type message">
  <button onclick="send()">➤</button>
</div>

<input type="file" id="file" hidden onchange="uploadFile()">

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let name = prompt("Enter name");
socket.emit("join", name);

function toggle(){
  document.getElementById("sidebar").classList.toggle("active");
}

function send(){
  let msg = document.getElementById("msg").value;
  if(msg){
    socket.emit("send", msg);
    document.getElementById("msg").value="";
  }
}

socket.on("messages", (data)=>{
  let chat = document.getElementById("chat");
  chat.innerHTML="";

  data.forEach(m=>{
    if(m.system){
      chat.innerHTML += "<div>"+m.text+"</div>";
    } else if(m.file){
      chat.innerHTML += `<div class="msg">
        <img src="${m.file}" onclick="openImg('${m.file}')">
      </div>`;
    } else {
      chat.innerHTML += `<div class="msg">${m.user}: ${m.text}</div>`;
    }
  });

  chat.scrollTop = chat.scrollHeight;
});

socket.on("users", (u)=>{
  document.getElementById("users").innerHTML = u.join("<br>");
});

// FILE
function openFile(){
  document.getElementById("file").click();
}

function uploadFile(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let form = new FormData();
  form.append("file", file);

  let xhr = new XMLHttpRequest();

  xhr.upload.onprogress = (e)=>{
    let percent = Math.round((e.loaded/e.total)*100);
    document.getElementById("progress").innerHTML = percent+"%";
  };

  xhr.onload = ()=>{
    let res = JSON.parse(xhr.response);
    socket.emit("file", res.file);
    document.getElementById("progress").innerHTML="";
  };

  xhr.open("POST","/upload");
  xhr.send(form);
}

// FULL IMAGE VIEW
function openImg(src){
  let win = window.open("");
  win.document.write("<img src='"+src+"' style='width:100%'>");
}
</script>

</body>
</html>
