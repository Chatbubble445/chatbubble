<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
  background:#0b141a;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#202c33;
  transition:0.3s;
  padding:10px;
  z-index:2;
}
#sidebar.active{ left:0; }

/* TOP BAR */
#top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#202c33;
  padding:10px;
  color:white;
}
#menuBtn{font-size:22px;cursor:pointer;}

/* CHAT AREA */
#chat{
  position:absolute;
  top:50px;
  bottom:60px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MSG */
.msg{
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}
.me{
  background:#005c4b;
  align-self:flex-end;
}
.other{
  background:#202c33;
}
.system{
  text-align:center;
  color:#aaa;
  font-size:12px;
}

/* TYPING */
#typing{
  font-size:12px;
  color:#aaa;
  margin-left:10px;
}

/* INPUT FIXED */
#inputBox{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  gap:5px;
  padding:10px;
  background:#202c33;
}

/* INPUT */
#msg{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

/* ICON BUTTONS */
.icon{
  background:none;
  border:none;
  color:white;
  font-size:18px;
}

/* SEND */
#sendBtn{
  background:#00a884;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>🟢 Users</h3>
  <ul id="users"></ul>
</div>

<!-- TOP -->
<div id="top">
  <span id="menuBtn">☰</span>
  <span>ChatBubble</span>
  <span>💬 🔔 👤</span>
</div>

<!-- CHAT -->
<div id="chat"></div>
<div id="typing"></div>

<!-- INPUT -->
<div id="inputBox">
  <button class="icon">😊</button>
  <input id="msg" placeholder="Type here..." oninput="typing()">
  <input type="file" id="file" hidden onchange="sendImage()">
  <button class="icon" onclick="document.getElementById('file').click()">📎</button>
  <button id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* SIDEBAR */
const sidebar=document.getElementById("sidebar");
const menuBtn=document.getElementById("menuBtn");

menuBtn.onclick=(e)=>{
  e.stopPropagation();
  sidebar.classList.toggle("active");
};

document.addEventListener("click",(e)=>{
  if(sidebar.classList.contains("active") && !sidebar.contains(e.target)){
    sidebar.classList.remove("active");
  }
});

sidebar.onclick=(e)=>e.stopPropagation();

/* USER */
let username=localStorage.getItem("username");
if(!username){
  username=prompt("Enter name");
  localStorage.setItem("username",username);
}
socket.emit("join",{name:username});

/* SEND */
function sendMsg(){
  let input=document.getElementById("msg");
  if(!input.value) return;

  socket.emit("message",input.value);
  input.value="";
}

/* IMAGE */
function sendImage(){
  let file=document.getElementById("file").files[0];
  let reader=new FileReader();
  reader.onload=(e)=>{
    socket.emit("image",e.target.result);
  };
  reader.readAsDataURL(file);
}

/* TYPING */
function typing(){
  socket.emit("typing",username);
}

socket.on("typing",(name)=>{
  if(name!==username){
    document.getElementById("typing").innerText=name+" is typing...";
    setTimeout(()=>{
      document.getElementById("typing").innerText="";
    },1000);
  }
});

/* UI */
function addMsg(type,text){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function addSystem(text){
  let div=document.createElement("div");
  div.className="system";
  div.innerText=text;
  chat.appendChild(div);
}

/* RECEIVE */
socket.on("message",data=>{
  if(data.user===username){
    addMsg("me",data.text);
  }else{
    addMsg("other",data.user+": "+data.text);
  }
});

socket.on("image",data=>{
  let img=document.createElement("img");
  img.src=data.src;
  img.style.maxWidth="200px";

  let div=document.createElement("div");
  div.className="msg";
  div.appendChild(img);

  chat.appendChild(div);
});

socket.on("system",data=>{
  addSystem("🟢 "+data.text);
});

socket.on("users",users=>{
  usersList.innerHTML="";
  Object.values(users).forEach(u=>{
    let li=document.createElement("li");
    li.innerText=u.name;
    usersList.appendChild(li);
  });
});

const chat=document.getElementById("chat");
const usersList=document.getElementById("users");
</script>

</body>
</html>
