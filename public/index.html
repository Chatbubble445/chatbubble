<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body { margin:0; font-family:Arial; background:#0b141a; color:white; }

#top { background:#202c33; padding:10px; }

#chat { height:65vh; overflow-y:auto; padding:10px; }

.msg { padding:10px; margin:5px; border-radius:10px; }
.me { background:#005c4b; text-align:right; }
.other { background:#202c33; }

#inputBox { display:flex; position:fixed; bottom:0; width:100%; }
input, select { padding:10px; }
button { padding:10px; }

#progress { height:5px; background:green; width:0%; }
</style>

</head>
<body>

<div id="top">
  💬 ChatBubble  
  <div id="online">🟢 0 users online</div>

  <select id="room">
    <option value="global">🌍 Global</option>
    <option value="india">🇮🇳 India</option>
    <option value="fun">😄 Fun</option>
  </select>

  <button onclick="join()">Join</button>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = prompt("Enter name") || "Guest" + Math.floor(Math.random()*1000);
let room = "global";

function join(){
  room = document.getElementById("room").value;
  socket.emit("join", {name: username, room: room});
}

function sendMsg(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  socket.emit("message", msg);
  addMsg("me", msg);
}

function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);

  document.getElementById("chat").scrollTop = 999999;
}

socket.on("message", (data) => {
  addMsg("other", data.rank + " " + data.user + ": " + data.text);
  document.getElementById("sound").play();
});

socket.on("users", (users) => {
  document.getElementById("online").innerText =
    "🟢 " + Object.keys(users).length + " users online";
});
</script>

</body>
</html>
