<!DOCTYPE html>
<html>
<head>
<title>ChatBubble</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
  display:flex;
}

/* Sidebar */
#sidebar {
  width:250px;
  background:#202c33;
  height:100vh;
  overflow:auto;
  padding:10px;
}

#users li {
  padding:10px;
  border-bottom:1px solid #333;
}

/* Main */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* Top */
#top {
  background:#202c33;
  padding:10px;
}

/* Chat */
#chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* Messages */
.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
  word-wrap:break-word;
}

.me {
  background:#005c4b;
  align-self:flex-end;
}

.other {
  background:#202c33;
  align-self:flex-start;
}

.system {
  text-align:center;
  color:gray;
  font-size:12px;
}

/* Input */
#inputBox {
  display:flex;
  padding:10px;
  background:#202c33;
  gap:5px;
}

#msg {
  flex:1;
  padding:10px;
}

button {
  padding:10px;
  background:#00a884;
  color:white;
  border:none;
}

/* Upload Progress */
#progressContainer {
  display:none;
  background:#202c33;
  padding:5px;
}

#progressBar {
  height:10px;
  width:0%;
  background:#00a884;
  text-align:center;
  font-size:10px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
  <h3>🟢 Users</h3>
  <ul id="users"></ul>
</div>

<!-- Main -->
<div id="main">

  <div id="top">ChatBubble</div>

  <div id="chat"></div>

  <!-- Progress -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <!-- Input -->
  <div id="inputBox">
    <input id="msg" placeholder="Type message">
    <input type="file" id="file" onchange="sendImage()">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = localStorage.getItem("username");

if(!username){
  username = prompt("Enter name");
  localStorage.setItem("username", username);
}

socket.emit("join", {name: username});

// send text
function sendMsg(){
  const input = document.getElementById("msg");
  const text = input.value;
  if(!text) return;

  socket.emit("message", text);
  input.value = "";
}

// send image with progress
function sendImage(){
  const file = document.getElementById("file").files[0];
  if(!file) return;

  const progressContainer = document.getElementById("progressContainer");
  const progressBar = document.getElementById("progressBar");

  progressContainer.style.display = "block";

  const reader = new FileReader();

  reader.onprogress = function(e){
    if(e.lengthComputable){
      let percent = Math.round((e.loaded / e.total) * 100);
      progressBar.style.width = percent + "%";
      progressBar.innerText = percent + "%";
    }
  };

  reader.onload = function(e){
    socket.emit("image", e.target.result);

    setTimeout(() => {
      progressContainer.style.display = "none";
      progressBar.style.width = "0%";
      progressBar.innerText = "";
    }, 500);
  };

  reader.readAsDataURL(file);
}

// UI
function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  scrollDown();
}

function addImage(type, src){
  const div = document.createElement("div");
  div.className = "msg " + type;

  const img = document.createElement("img");
  img.src = src;
  img.style.maxWidth = "200px";

  div.appendChild(img);
  chat.appendChild(div);
  scrollDown();
}

function addSystem(text){
  const div = document.createElement("div");
  div.className = "system";
  div.innerText = text;
  chat.appendChild(div);
}

function scrollDown(){
  chat.scrollTop = chat.scrollHeight;
}

// receive
socket.on("message", data => {
  if(data.user === username){
    addMsg("me", data.text);
  } else {
    addMsg("other", data.user + ": " + data.text);
  }
});

socket.on("image", data => {
  if(data.user === username){
    addImage("me", data.src);
  } else {
    addImage("other", data.src);
  }
});

socket.on("system", data => addSystem(data.text));

socket.on("users", users => {
  usersList.innerHTML = "";
  Object.values(users).forEach(u => {
    const li = document.createElement("li");
    li.innerText = u.name;
    usersList.appendChild(li);
  });
});

const chat = document.getElementById("chat");
const usersList = document.getElementById("users");
</script>

</body>
</html>
