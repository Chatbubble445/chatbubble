<!DOCTYPE html>
<html>
<head>
  <title>ChatBubble</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      display:flex;
      flex-direction:column;
      background:#0b141a;
      font-family:sans-serif;
      color:white;
    }

    /* HEADER */
    #top {
      height:50px;
      background:#202c33;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      flex-shrink:0;
    }

    #menuBtn {
      font-size:22px;
      cursor:pointer;
    }

    /* CHAT AREA */
    #chat {
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .msg {
      padding:10px;
      border-radius:10px;
      max-width:75%;
    }

    .me {
      background:#005c4b;
      align-self:flex-end;
    }

    .other {
      background:#202c33;
      align-self:flex-start;
    }

    .system {
      text-align:center;
      font-size:12px;
      color:#aaa;
    }

    img {
      max-width:200px;
      border-radius:10px;
    }

    /* INPUT BOX FIXED */
    #inputBox {
      display:flex;
      gap:5px;
      padding:8px;
      background:#202c33;
      position:sticky;
      bottom:0;
    }

    #msg {
      flex:1;
      padding:10px;
      border:none;
      border-radius:20px;
      outline:none;
    }

    #sendBtn {
      width:40px;
      border:none;
      border-radius:50%;
      background:#00a884;
      color:white;
      font-size:16px;
    }

    #file { display:none; }

  </style>
</head>

<body>

<!-- HEADER -->
<div id="top">
  <span id="menuBtn">☰ ChatBubble</span>
  <div>💬 🔔 👤</div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT (FIXED) -->
<div id="inputBox">
  <input id="msg" placeholder="Type message..." />
  <input type="file" id="file" accept="image/*" onchange="sendImage()" />
  <button onclick="pick()">📎</button>
  <button id="sendBtn" onclick="sendMsg()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const chat = document.getElementById("chat");
const msgInput = document.getElementById("msg");

let username = localStorage.getItem("username");
if(!username){
  username = prompt("Enter name") || "Guest";
  localStorage.setItem("username", username);
}

socket.emit("join", { name: username });

function addMsg(type,text){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addImage(type,src){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = `<img src="${src}">`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMsg(){
  let text = msgInput.value.trim();
  if(!text) return;
  socket.emit("message", text);
  msgInput.value="";
}

function pick(){
  document.getElementById("file").click();
}

function sendImage(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let reader = new FileReader();
  reader.onload = (e)=>{
    socket.emit("image", e.target.result);
  };
  reader.readAsDataURL(file);
}

socket.on("message", (data)=>{
  if(data.user === username){
    addMsg("me", data.text);
  } else {
    addMsg("other", data.user + ": " + data.text);
  }
});

socket.on("image", (data)=>{
  if(data.user === username){
    addImage("me", data.src);
  } else {
    addImage("other", data.src);
  }
});

socket.on("system", (data)=>{
  let div = document.createElement("div");
  div.className="system";
  div.innerText=data.text;
  chat.appendChild(div);
});

</script>

</body>
</html>
